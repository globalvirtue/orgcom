version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: remindme
      POSTGRES_USER: remindme
      POSTGRES_PASSWORD: remindme_secret
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U remindme']
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://remindme:remindme_secret@postgres:5432/remindme
      NODE_ENV: development
      PORT: 3001
      FRONTEND_URL: http://localhost:5173
    volumes:
      - ./backend/src:/app/src
      - audio_uploads:/app/uploads/audio

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - '5173:5173'
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src

volumes:
  pgdata:
  audio_uploads:
